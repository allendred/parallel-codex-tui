name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_VERSION="${{ inputs.version }}"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $RELEASE_VERSION" >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release version $RELEASE_VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          CI: "0"

      - name: Build package
        id: pack
        shell: bash
        run: |
          npm pack --json | tee npm-pack.json
          TARBALL=$(node <<'NODE'
          const fs = require("node:fs");
          const packs = JSON.parse(fs.readFileSync("npm-pack.json", "utf8"));

          if (packs.length !== 1 || !packs[0].filename) {
            throw new Error("Expected exactly one npm pack output");
          }

          console.log(packs[0].filename);
          NODE
          )
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.release.outputs.package_version }}"
          if npm view "parallel-codex-tui@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            PUBLISHED=true
            echo "parallel-codex-tui@$PACKAGE_VERSION is already published on npm."
          else
            PUBLISHED=false
            echo "parallel-codex-tui@$PACKAGE_VERSION is not published on npm."
          fi

          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        shell: bash
        run: |
          PACKAGE_TARBALL="${{ steps.pack.outputs.tarball }}"
          if [ ! -f "$PACKAGE_TARBALL" ]; then
            echo "Package tarball not found: $PACKAGE_TARBALL" >&2
            exit 1
          fi

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub OIDC is not available. Check that permissions.id-token is set to write." >&2
            exit 1
          fi

          echo "Publishing to npm with Trusted Publishing via GitHub OIDC."
          trusted_log="$(mktemp)"
          if npm publish --access public "$PACKAGE_TARBALL" 2>&1 | tee "$trusted_log"; then
            exit 0
          fi

          if grep -Eq "ENEEDAUTH|E401" "$trusted_log"; then
            echo "::error::Trusted Publishing was not accepted. Configure npm Trusted Publishing for repository allendred/parallel-codex-tui, workflow filename release.yml, and allowed action npm publish."
          fi

          exit 1

      - name: Verify published package
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.release.outputs.package_version }}"
          PACKAGE_SPEC="parallel-codex-tui@$PACKAGE_VERSION"

          for ATTEMPT in {1..12}; do
            if PUBLISHED_VERSION=$(npm view "$PACKAGE_SPEC" version --json 2>/dev/null); then
              if [ "$PUBLISHED_VERSION" = "\"$PACKAGE_VERSION\"" ]; then
                break
              fi
            fi

            if [ "$ATTEMPT" -eq 12 ]; then
              echo "$PACKAGE_SPEC did not become visible on npm in time." >&2
              exit 1
            fi

            sleep 10
          done

          VERIFY_PREFIX=$(mktemp -d)
          trap 'rm -rf "$VERIFY_PREFIX"' EXIT
          npm install --global --prefix "$VERIFY_PREFIX" "$PACKAGE_SPEC"
          "$VERIFY_PREFIX/bin/parallel-codex-tui" --version | grep -F "parallel-codex-tui $PACKAGE_VERSION"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          PACKAGE_TARBALL="${{ steps.pack.outputs.tarball }}"

          if [ ! -f "$PACKAGE_TARBALL" ]; then
            echo "Package tarball not found: $PACKAGE_TARBALL" >&2
            exit 1
          fi

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" "$PACKAGE_TARBALL" --clobber
          else
            gh release create "$RELEASE_VERSION" "$PACKAGE_TARBALL" --verify-tag --title "$RELEASE_VERSION"
          fi

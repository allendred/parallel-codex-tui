name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26.x"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup npm
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_VERSION="${{ inputs.version }}"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $RELEASE_VERSION" >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release version $RELEASE_VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          CI: "0"

      - name: Build package
        run: npm pack --json

      - name: Check npm version
        id: npm
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.release.outputs.package_version }}"
          if npm view "parallel-codex-tui@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            PUBLISHED=true
            echo "parallel-codex-tui@$PACKAGE_VERSION is already published on npm."
          else
            PUBLISHED=false
            echo "parallel-codex-tui@$PACKAGE_VERSION is not published on npm."
          fi

          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        shell: bash
        run: |
          remove_auth_token_config() {
            if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
              sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
            fi
          }

          restore_auth_token_config() {
            if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
              npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN" --userconfig "$NPM_CONFIG_USERCONFIG"
            fi
          }

          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] && [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "Trying npm trusted publishing via GitHub OIDC."
            remove_auth_token_config
            unset NODE_AUTH_TOKEN

            trusted_log="$(mktemp)"
            if npm publish --access public --provenance 2>&1 | tee "$trusted_log"; then
              exit 0
            fi

            if grep -Eq "ENEEDAUTH|E401" "$trusted_log"; then
              echo "Trusted publishing was not accepted; falling back to NPM_TOKEN if available."
            else
              exit 1
            fi
          fi

          if [ -z "$NPM_TOKEN" ]; then
            echo "No NPM_TOKEN fallback is configured." >&2
            exit 1
          fi

          echo "Publishing to npm with NPM_TOKEN."
          export NODE_AUTH_TOKEN="$NPM_TOKEN"
          restore_auth_token_config
          token_log="$(mktemp)"
          if npm publish --access public --provenance 2>&1 | tee "$token_log"; then
            exit 0
          fi

          if grep -q "EOTP" "$token_log"; then
            echo "::error::NPM_TOKEN requires a one-time password. Replace it with an npm automation token or configure Trusted Publishing."
          fi

          exit 1
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: parallel-codex-tui-*.tgz

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: "24.15.x"
            test-args: ""
          - os: ubuntu-latest
            node-version: "26.x"
            test-args: ""
          - os: macos-latest
            node-version: "26.x"
            test-args: "--maxWorkers=1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check package contents
        run: npm run verify:package

      - name: Test
        run: npm test -- ${{ matrix.test-args }}
        env:
          CI: "0"

      - name: Check whitespace
        run: git diff --check
